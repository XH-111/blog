services:
  postgres:
    image: postgres:16
    container_name: blog-postgres
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog123456
      POSTGRES_DB: blog_dev
    ports:
      - "5432:5432"
    volumes:
      - blog_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  blog_postgres_data:
